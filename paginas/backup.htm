<script>
window.onerror = MensagemErro;

var versao = 1;
console.log("versao: "+versao);

let TabCorrente = [];
let TabMensal = [];
let TabPassado = [];
$.when(
    $.getJSON("../base/corrente"),
    $.getJSON("../base/mensal"),
    $.getJSON("../base/passado")
).done(function(resCorrente, resMensal, resPassado) {
    TabCorrente = resCorrente[0];
    TabMensal = resMensal[0];
    TabPassado = resPassado[0];

	AtualizaPagina();
	AtualizaControle();

	function AtualizaPagina() {
		for (var n=0;n<2;n++) {
			if (Mes-n>0) {mesbase=Mes-n;anobase = Ano;}
			if (Mes-n==0) {mesbase=12;anobase=Ano-1;}
			if (Mes-n<0) {mesbase=mesbase-1;anobase=Ano-1;}
			MontaTabela(anobase+""+Zerado(mesbase,2,""),n);
		}
	}
	
	function MontaTabela(deftabela,N) {
		var EntradaExtrato=0,DespesaExtrato=0,ReceitaExtrato=0;
	
		if (N==0) {
			var TabExtrato = resCorrente[0];
			var nomeBkp = "corrente";
		} else if (N==1) {
			var TabExtrato = resPassado[0];
			var nomeBkp = "passado";
		}
			
		TabExtrato.sort(function(a, b) {
			return a.Data > b.Data ? -1 : a.Data < b.Data ? 1 : 0;
			return a.Descricao < b.Descricao ? -1 : a.Descricao > b.Descricao ? 1 : 0;
			return a.Valor < b.Valor ? -1 : a.Valor > b.Valor ? 1 : 0;
		});
			
		for (var i=0; i<TabExtrato.length; i++) {
			if (TabExtrato[i].Data.substr(0,6) == deftabela) {
				if (TabExtrato[i].Valor > 0) EntradaExtrato = EntradaExtrato + TabExtrato[i].Valor;
				if (TabExtrato[i].Valor < 0) DespesaExtrato = DespesaExtrato + TabExtrato[i].Valor;
			}
		}
		ReceitaExtrato = EntradaExtrato + DespesaExtrato;
		
		var html = "", descricao, forma, data, etiqueta = "", velink, classe = "class='painel'", valor, total = 0, dtotal = 0, positivo = 0, negativo = 0;
		for (var i=0; i<TabExtrato.length; i++) {
			if (TabExtrato[i].Data.substr(0,6) == deftabela) {
				if (data!=TabExtrato[i].Data) {
					total = ReceitaExtrato - (positivo + negativo);
					if (total<0) total = dtotal*-1;
					data = TabExtrato[i].Data;
					for (var j=0; j<TabExtrato.length; j++) {
						if (TabExtrato[j].Data.substr(0,6) == deftabela && TabExtrato[j].Data == data && TabExtrato[j].Descricao!="Saldo") {
							dtotal = dtotal + TabExtrato[j].Valor;
						}
					}
					if (dtotal!=0 && dtotal<0) dtotal = dtotal*-1; etiqueta = "R$ "+formatamoeda(dtotal);
				}
				dtotal = 0;
				etiqueta = "";
				if (TabExtrato[i].Valor > 0) {positivo = positivo + TabExtrato[i].Valor;var CorFonte = "#5CACEE"}
				if (TabExtrato[i].Valor < 0) {negativo = negativo + TabExtrato[i].Valor;var CorFonte = "#CD5555"}
				if (TabExtrato[i].Descricao == "Saldo") {var CorFonte = "#528B8B"}
				descricao = TabExtrato[i].Descricao;
				forma = TabExtrato[i].Forma;
				valor = TabExtrato[i].Valor;
				if (valor<0) valor = valor*-1;
				dtmes = TabExtrato[i].Data.substr(4,2)-Zerado(1,2,"");
				if (dtmes==0) dtmes = 12;
				if (TabExtrato[i].Descricao == "Saldo") {descricao = descricao + " " + nomedomes(dtmes)}
				if (TabExtrato[i].Descricao == "Salario") {descricao = descricao + " " + nomedomes(TabExtrato[i].Data.substr(4,2))}
				html += "<TR><TD vAlign='middle' align='center' width='100%'>";
				html += "<center><TABLE border='0' cellspacing='0' width='99%' cellpadding='0' class='painel'><TR style='height: 40'>";
				html += "<TD width='40'></TD><TD vAlign='middle' align='center'><font size='1'>"+vediasemana(arrumadata(TabExtrato[i].Data)).substr(0,3).toUpperCase()+"</font><p><font size='2'><b>"+TabExtrato[i].Data.substr(6,2)+"</b></font></TD>";
				html += "<TD width='10'></TD><TD vAlign=middle width='40%'><font size='1'><font size='2'>"+descricao.substr(0,1).toUpperCase()+"</font>"+descricao.substring(1, descricao.length).toUpperCase()+"</font><p><font size='1'><i>"+DefineForma(forma)+"</i></font></TD>";
				html += "<TD vAlign=middle align=right width='40%'><font style='color:"+CorFonte+"' size='3'>R$ "+formatamoeda(valor)+"</font></td><TD width='40'></TD>";
				html += "</TR></TABLE></center></TD></TR>";
			}
		}
		nomemes1 = eval("nomemes1"+N);
		nomemes2 = eval("nomemes2"+N);
		nomemes3 = eval("nomemes3"+N);
		nomemes4 = eval("nomemes4"+N);
		nomemes1.innerHTML = "B";
		nomemes2.innerHTML = "ACKUP";
		nomemes3.innerHTML = nomeBkp.substr(0,1).toUpperCase();
		nomemes4.innerHTML = nomeBkp.substring(1, nomeBkp.length).toUpperCase();
		exSaldo = eval("exSaldo"+N);
		exSaldo.innerHTML = html;
	}
	var CreditoVisa = 0, TiraFies = 0;
	function AtualizaControle() {
		var TotalApagar=0, TotalPago=0, TotalControle = 0, etiqueta1 = "", etiqueta2 = "";
			
		TabCorrente.sort(function(a, b) {
			return a.Data < b.Data ? -1 : a.Data > b.Data ? 1 : 0;
			return a.Descricao < b.Descricao ? -1 : a.Descricao > b.Descricao ? 1 : 0;
			return a.Valor < b.Valor ? -1 : a.Valor > b.Valor ? 1 : 0;
		});
	
		TabMensal.sort(function(a, b) {
			return a.Data < b.Data ? -1 : a.Data > b.Data ? 1 : 0;
			return a.Descricao < b.Descricao ? -1 : a.Descricao > b.Descricao ? 1 : 0;
			return a.Valor < b.Valor ? -1 : a.Valor > b.Valor ? 1 : 0;
		});
		
		var filtro1, filtro2, filtro3, filtro4;
		for (var i=0; i<TabCorrente.length; i++) {
		    if (TabCorrente[i].Valor <= 0) {
			    filtro1 = "TabCorrente[i].Valor <= 0";
		    } else {
			    filtro1 = "TabCorrente[i].Valor > 0";
		    }
		    if (TabCorrente[i].Data>hoje) {
			    if (eval(filtro1)) {
					TotalApagar = TotalApagar + TabCorrente[i].Valor;
				}
			}
			if (TabCorrente[i].Data<=hoje) {
				if (eval(filtro1)) {
					TotalPago = TotalPago + TabCorrente[i].Valor;
				}
			}
		}
		TotalControle = TotalApagar + TotalPago;
	
		if (filtro1=="TabCorrente[i].Valor <= 0") {
			TotalApagar = TotalApagar*-1;
			TotalPago = TotalPago*-1;
			TotalControle = TotalControle*-1;
			etiqueta1 = "Despesa";
			etiqueta2 = "Gasto";
			var Cor = "#8B4513";
			var CorF = "#CD5555";
		} else {
			etiqueta1 = "Receita";
			etiqueta2 = "Recebido";
			var Cor = "#2F4F4F";
			var CorF = "#528B8B";
		}
	
		TabCorrente.sort(function(a, b) {
			return a.Data < b.Data ? -1 : a.Data > b.Data ? 1 : 0;
			return a.Descricao < b.Descricao ? -1 : a.Descricao > b.Descricao ? 1 : 0;
			return a.Valor < b.Valor ? -1 : a.Valor > b.Valor ? 1 : 0;
		});
	
		TabMensal.sort(function(a, b) {
			return a.Data < b.Data ? -1 : a.Data > b.Data ? 1 : 0;
			return a.Descricao < b.Descricao ? -1 : a.Descricao > b.Descricao ? 1 : 0;
			return a.Valor < b.Valor ? -1 : a.Valor > b.Valor ? 1 : 0;
		});
	
		var html = "", velink, filtro1, filtro2, filtro3, CorFonte;
		for (var i=0; i<TabMensal.length; i++) {
		    if (TabMensal[i].Valor <= 0) {
			    //filtro1 = "TabCorrente[i].Valor < 0";
			    var filtro2 = "TabMensal[i].Valor <= 0";
			    //var filtro3 = "TabMensal[j].Valor < 0";
				CorFonte = "#CD5555";
		    } else {
			    //filtro1 = "TabCorrente[i].Valor > 0";
			    var filtro2 = "TabMensal[i].Valor > 0";
			    //var filtro3 = "TabMensal[j].Valor > 0";
				CorFonte = "#5CACEE";
		    }
			if (eval(filtro2)) {
				var descricao = TabMensal[i].Descricao;
				var forma = TabMensal[i].Forma;
				if (TabMensal[i].Descricao == "Salario") {
					valor = TabMensal[i].Valor;
					mensalidade = Remuneracao(TabMensal[i].Valor);
				} else {
					valor = TabMensal[i].Valor;
					mensalidade = parcelamento(TabMensal[i].Valor,TabMensal[i].Parcela);
					if (valor < 0) valor = valor*-1;
					if (mensalidade < 0) mensalidade = mensalidade*-1;
				}
				html += "<TR><TD vAlign='middle' align='center' width='100%'>";
				html += "<center><TABLE border='0' cellspacing='0' width='99%' cellpadding='0' class='painel'><TR style='height: 40'>";
				html += "<TD width='40'></TD><TD vAlign='middle' align='center'><font size='1'>"+vediasemana(arrumadata(Ano+""+Mes+""+TabMensal[i].Data)).substr(0,3).toUpperCase()+"</font><p><font size='2'><b>"+Zerado(TabMensal[i].Data,2,'')+"</b></font></TD>";
				html += "<TD width='10'></TD><TD vAlign='middle' width='40%'><font size='1'><font size='2'>"+descricao.substr(0,1).toUpperCase()+"</font>"+descricao.substring(1, descricao.length).toUpperCase()+"</font><p><font size='1'><i>"+DefineForma(forma)+"</i></font></TD>";
				html += "<TD vAlign=middle align=right width=40%><font style='color:"+CorFonte+"' size='3'>R$ "+formatamoeda(mensalidade)+"</font></td><TD width='40'></TD>";
				html += "</TR></TABLE></center></TD></TR>";
				}
		}
		var nomeBkp = "mensal";
		nomemes12.innerHTML = "B";
		nomemes22.innerHTML = "ACKUP";
		nomemes32.innerHTML = nomeBkp.substr(0,1).toUpperCase();
		nomemes42.innerHTML = nomeBkp.substring(1, nomeBkp.length).toUpperCase();
		exSaldo2.innerHTML = html;
	}
	
	var elem = document.getElementById("mySwipe");
	window.mySwipe = Swipe(elem, {
	    startSlide: 2
	});
	
	}).fail(function(jqXHR, textStatus, errorThrown) {
    // Se QUALQUER uma das requisições falhar, este bloco é executado
    console.error("Erro ao carregar um dos arquivos JSON:", textStatus, errorThrown);
});
</script>
